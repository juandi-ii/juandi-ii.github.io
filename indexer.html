<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Interactivo</title>
    <link rel="stylesheet" href="style.css">
    <script>
        // Esta función muestra las opciones después de que el video termine
        function mostrarOpciones(videoId) {
            document.getElementById('video-container').style.display = 'none'; // Ocultar el video
            document.getElementById('opciones').style.display = 'block'; // Mostrar las opciones
            window.currentVideoId = videoId; // Guardar el id del video actual para usarlo más tarde
        }

        // Esta función cambia el video según la opción seleccionada
        function cambiarVideo(opcion) {
            let videoUrl = ''; // Variable para la URL del video que vamos a cargar
            let mostrarOpcionesSiguientes = false; // Variable para decidir si mostrar más opciones

            // Según el video actual (almacenado en window.currentVideoId), cambiamos el video
            if (opcion === 'opcion1') {
                videoUrl = 'base/video/2.mp4'; // Ruta para la Opción 1 (correcta)
                mostrarOpcionesSiguientes = true;
            } else if (opcion === 'opcion2') {
                videoUrl = 'base/video/4.mp4'; // Ruta para la Opción 2 (incorrecta)
            } else if (opcion === 'opcion3') {
                videoUrl = 'base/video/5.mp4'; // Ruta para la Opción 3 (correcta)
                mostrarOpcionesSiguientes = true;
            } else if (opcion === 'opcion4') {
                videoUrl = 'base/video/6.mp4'; // Ruta para la Opción 4 (incorrecta)
            } else if (opcion === 'opcion5') {
                videoUrl = 'base/video/7.mp4'; // Ruta para la Opción 5 (incorrecta)
            } else if (opcion === 'opcion6') {
                videoUrl = 'base/video/8.mp4'; // Ruta para la Opción 6 (correcta)
                mostrarOpcionesSiguientes = true;
            } else if (opcion === 'opcion7') {
                videoUrl = 'base/video/9.mp4'; // Ruta para la Opción 7 (correcta)
                mostrarOpcionesSiguientes = true;
            } else if (opcion === 'opcion8') {
                videoUrl = 'base/video/10.mp4'; // Ruta para la Opción 8 (incorrecta)
            } else if (opcion === 'opcion9') {
                videoUrl = 'base/video/11.mp4'; // Ruta para la Opción 9 (correcta)
                mostrarOpcionesSiguientes = true;
            } else if (opcion === 'opcion10') {
                videoUrl = 'base/video/12.mp4'; // Ruta para la Opción 10 (incorrecta)
            } else if (opcion === 'opcion11') {
                videoUrl = 'base/video/13.mp4'; // Ruta para la Opción 11 (incorrecta)
            } else if (opcion === 'opcion12') {
                videoUrl = 'base/video/14.mp4'; // Ruta para la Opción 12 (correcta)
            }   

            // Cambiar la fuente del video
            let videoElement = document.getElementById('videoPlayer');
            videoElement.src = videoUrl;

            // Volver a mostrar el contenedor del video y ocultar las opciones
            document.getElementById('video-container').style.display = 'block';
            document.getElementById('opciones').style.display = 'none';
            document.getElementById('opciones1').style.display = 'none'; // Ocultar opciones 3 y 4
            document.getElementById('opciones2').style.display = 'none'; // Ocultar opciones 5 y 6
            document.getElementById('opciones3').style.display = 'none'; // Ocultar opciones 7 y 8
            document.getElementById('opciones4').style.display = 'none'; // Ocultar opciones 9 y 10
            document.getElementById('opciones5').style.display = 'none'; // Ocultar opciones 11 y 12

            // Reproducir el video inmediatamente
            videoElement.play();

            // Lógica para mostrar las siguientes opciones si la respuesta es correcta
            if (mostrarOpcionesSiguientes) {
                videoElement.onended = function() {
                    if (opcion === 'opcion1') {
                        document.getElementById('opciones1').style.display = 'block'; // Mostrar opciones 3 y 4
                    } else if (opcion === 'opcion3') {
                        document.getElementById('opciones2').style.display = 'block'; // Mostrar opciones 5 y 6
                    } else if (opcion === 'opcion6') {
                        document.getElementById('opciones3').style.display = 'block'; // Mostrar opciones 7 y 8
                    } else if (opcion === 'opcion7') {
                        document.getElementById('opciones4').style.display = 'block'; // Mostrar opciones 9 y 10
                    } else if (opcion === 'opcion9') {
                        document.getElementById('opciones5').style.display = 'block'; // Mostrar opciones 11 y 12
                    }
                };
            } else {
                // Mostrar mensaje de "Chocaste" cuando el video termina
                videoElement.onended = function() {
                    document.getElementById('video-container').style.display = 'none'; // Ocultar el video
                    document.getElementById('choqueMessage').style.display = 'block'; // Mostrar el mensaje de choque
                };
            }
        }
    </script>
</head>
<body>
    <!-- Contenedor para el video principal -->
    <div id="video-container">
        <video id="videoPlayer" width="640" controls onended="mostrarOpciones('videoPrincipal')">
            <source src="base/video/1principal.mp4" type="video/mp4"> <!-- Ruta del video principal -->
            Tu navegador no soporta la reproducción de video.
        </video>
    </div>

    <!-- Opciones que aparecen después de que el video principal termine -->
    <div id="opciones" style="display:none;">
        <button onclick="cambiarVideo('opcion1')">
            <img src="base/imagen/detener.png" alt="" width="50"> Frenar <!-- Correcta -->
        </button>
        <button onclick="cambiarVideo('opcion2')">
            <img src="base/imagen/seguir.png" alt="" width="50"> Seguir
        </button>
    </div>

    <!-- Opciones que aparecen después de elegir la Opción 1 -->
    <div id="opciones1" style="display:none;">
        <button onclick="cambiarVideo('opcion3')">
            <img src="imagenes/opcion3.jpg" alt="" width="50"> Opción 3 <!-- Correcta -->
        </button>
        <button onclick="cambiarVideo('opcion4')">
            <img src="imagenes/opcion4.jpg" alt="" width="50"> Opción 4
        </button>
    </div>

    <!-- Opciones que aparecen después de elegir la Opción 2 -->
    <div id="opciones2" style="display:none;">
        <button onclick="cambiarVideo('opcion5')">
            <img src="imagenes/opcion5.jpg" alt="" width="50"> Opción 5
        </button>
        <button onclick="cambiarVideo('opcion6')">
            <img src="imagenes/opcion6.jpg" alt="" width="50"> Opción 6 <!-- Correcta -->
        </button>
    </div>

    <!-- Opciones que aparecen después de elegir la Opción 3 -->
    <div id="opciones3" style="display:none;">
        <button onclick="cambiarVideo('opcion7')">
            <img src="imagenes/opcion7.jpg" alt="" width="50"> Opción 7 <!-- Correcta -->
        </button>
        <button onclick="cambiarVideo('opcion8')">
            <img src="imagenes/opcion8.jpg" alt="" width="50"> Opción 8
        </button>
    </div>

    <!-- Opciones que aparecen después de elegir la Opción 4 -->
    <div id="opciones4" style="display:none;">
        <button onclick="cambiarVideo('opcion9')">
            <img src="imagenes/opcion9.jpg" alt="" width="50"> Opción 9 <!-- Correcta -->
        </button>
        <button onclick="cambiarVideo('opcion10')">
            <img src="imagenes/opcion10.jpg" alt="" width="50"> Opción 10
        </button>
    </div>

    <!-- Opciones que aparecen después de elegir la Opción 5 -->
    <div id="opciones5" style="display:none;">
        <button onclick="cambiarVideo('opcion11')">
            <img src="imagenes/opcion11.jpg" alt="" width="50"> Opción 11
        </button>
        <button onclick="cambiarVideo('opcion12')">
            <img src="imagenes/opcion12.jpg" alt="" width="50"> Opción 12 <!-- Correcta -->
        </button>
    </div>

    <!-- Mensaje de "Chocaste" -->
    <div id="choqueMessage" style="display:none;">
        ¡Chocaste!
    </div>
</body>
</html>
